version: "3.9"

services:
  backend:
    build: ./backend
    container_name: vm-portal-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=dev-secret-change-in-production
      - DATABASE_URL=sqlite:////data/vmrequest.db
    volumes:
      - db_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vm-portal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
