# Traefik v3 IngressRoute — uses traefik.io/v1alpha1 (not traefik.containo.us)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vm-portal
  namespace: vm-portal
spec:
  entryPoints:
    - web
  routes:
    # All traffic goes to the frontend (nginx proxies /api/ to backend internally)
    - match: Host(`compute-portal.k8s-ai-cluster.gosi.ins`)
      kind: Rule
      services:
        - name: vm-portal-frontend
          port: 80
---
