apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-portal-frontend
  namespace: vm-portal
  labels:
    app: vm-portal-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm-portal-frontend
  template:
    metadata:
      labels:
        app: vm-portal-frontend
    spec:
      imagePullSecrets:
        - name: harbor-registry-secret
      containers:
        - name: frontend
          image: k8sreglvp01.gosi.ins:8080/vm-portal/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: vm-portal-frontend
  namespace: vm-portal
spec:
  selector:
    app: vm-portal-frontend
  ports:
    - port: 80
      targetPort: 80
