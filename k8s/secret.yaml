# IMPORTANT: Replace the value of SECRET_KEY with a long random string before deploying.
# Generate one with: python3 -c "import secrets; print(secrets.token_hex(32))"
# Then base64-encode it: echo -n 'your-secret' | base64
#
# Do NOT commit this file with real secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: vm-portal-secret
  namespace: vm-portal
type: Opaque
stringData:
  SECRET_KEY: "CHANGE-ME-USE-A-LONG-RANDOM-STRING-IN-PRODUCTION"
